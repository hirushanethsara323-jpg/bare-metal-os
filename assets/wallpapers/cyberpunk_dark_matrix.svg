<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050B14"/>
      <stop offset="50%" stop-color="#0A1828"/>
      <stop offset="100%" stop-color="#020509"/>
    </linearGradient>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF66"/>
      <stop offset="50%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#7000FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Layer -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Cyberpunk Matrix Grid Lines -->
  <g stroke="#00E5FF" stroke-opacity="0.1" stroke-width="1">
    <path d="M 0,100 L 800,100 M 0,200 L 800,200 M 0,300 L 800,300 M 0,400 L 800,400 M 0,500 L 800,500" />
    <path d="M 100,0 L 100,600 M 200,0 L 200,600 M 300,0 L 300,600 M 400,0 L 400,600 M 500,0 L 500,600 M 600,0 L 600,600 M 700,0 L 700,600" />
  </g>

  <!-- Center Hexagon Circuit Logo -->
  <g transform="translate(400, 250)">
    <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60" fill="none" stroke="url(#neonGlow)" stroke-width="6" filter="url(#glow)"/>
    <polygon points="0,-90 78,-45 78,45 0,90 -78,45 -78,-45" fill="#0A1828" fill-opacity="0.8" stroke="#00FF66" stroke-width="2"/>
    <circle cx="0" cy="0" r="35" fill="url(#neonGlow)" filter="url(#glow)"/>
    <text x="0" y="10" font-family="monospace" font-size="28" font-weight="bold" fill="#050B14" text-anchor="middle">N</text>
  </g>

  <!-- Typography -->
  <text x="400" y="440" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="8">NOTHING OS</text>
  <text x="400" y="480" font-family="monospace" font-size="18" font-weight="bold" fill="#00FF66" text-anchor="middle" letter-spacing="4">V11.0 ENTERPRISE APEX PLATFORM</text>
  <text x="400" y="520" font-family="sans-serif" font-size="14" fill="#00E5FF" text-anchor="middle" opacity="0.8">Bare-Metal 32/64-bit Kernel &amp; Custom Ubuntu Distribution</text>
</svg>
